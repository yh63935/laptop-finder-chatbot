<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LaptopFinder Chatbot</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="chat-container">
            <header>
                <h2>LaptopFinder Chatbot</h2>
                <span alt="Close" id="cross" onclick="cancel()">X</span>
            </header>
            <div class="chatbot-messages">
                <p>Hi! I'm LaptopFinder Bot. Do you need help finding the right laptop?</p>
            </div>
            <div id="options" class="options"></div>
            <div class="chat-input">
                <textarea rows="0" cols="17" placeholder="Type your answer here..."></textarea>
                <button onclick="send()">Send</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
